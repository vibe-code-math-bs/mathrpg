<!-- BUILD PROGRESS
 [x] A spine   [x] B glyph+log   [x] C skills   [ ] D today
 [ ] E character   [ ] F quests   [ ] G polish
 notes: Phase C complete — skills.js. renderSkills() groups state.skills by branch
 (getBranchOrder() walks SEED_BRANCHES first, then appends any branches the user has
 since created), each branch a <section> with a header row (name + optional tag +
 "subtopics N/total" completion meter) over a 2-col specimen-card grid
 (skillGlyphForSkill() at 64px, name, "Lv X · Mastery Y" status line color-matched to
 rust/active state, pills for rusty/active + priorityGrowth/activeResearch flags).
 Skills carrying a seed synergyNote get a full-width (grid-column:span 2) italic
 synergy card right after their own card, plus a ✦ mark top-right on the card itself
 — SIMPLIFICATION: the ✦/synergy-card always render when synergyNote is present rather
 than computing live prereq-met state, since the seed only carries prose, not
 structured prereq refs; revisit if that matters later. isSkillActive() (touched
 <=14 days OR targeted by an active focus) drives the celadon disc + "active" pill,
 mirroring the rust hatch/pill from isSkillRusting() (core.js, Phase B). Dashed
 glyph-legend box at the bottom (ring/disc/hatch samples). A dashed "+ Add a new
 skill" affordance opens a modal to register a brand-new skill node: name, branch
 (existing, or "+ New branch…" which slugifies a typed name), class (math/physics/
 both), maintenance flag, and an optional starting roadmap textarea that reuses the
 seed file's own "- [x] / [ ]" line convention (parseRoadmapText()).
 Tapping any card opens the Skill Detail modal (reuses the Phase B .modal-overlay/
 .modal-card chrome): renamable title (pencil -> inline input -> blur/Enter commits),
 glyph + "Lv X / N subtopics" + Mastery level + a hand-rolled (non-native, per design
 spec §11) amber progress bar to the next Mastery level, a rust-status line when
 applicable, the skill's optional note/synergy text, then a fully editable roadmap
 list — checkbox (check/uncheck recomputes skill.level live), pencil (inline rename),
 × (remove, with a confirm()) — plus an add-subtopic row at the bottom, then that
 skill's unit history (newest first, source/xp/quantity/note, capped at 15 + a
 "+N earlier" line). All mutations call saveState() immediately; the underlying
 Skills grid re-renders via refreshCurrentScreen() when the modal closes.
 Verified with a jsdom smoke test (load all 8 scripts, open a skill, toggle/add/
 rename/delete a subtopic, rename the skill, create a brand-new skill incl. a brand-
 new branch via both bare "[x]" and dash-prefixed "- [x]" seed-style lines, confirm
 it appears in the grid, confirm localStorage roundtrip) — all green; caught and
 fixed one real bug (dash-prefixed roadmap lines weren't parsing before the fix —
 order of dash-strip vs. checkbox-marker-strip was swapped).
 Deferred (cosmetic, not data-flow): the design spec's Skills-only top-bar filter-
 pill row (§4) — branch sections already give a gate-free full view of the tree, so
 this can slot in later without touching skills.js's rendering logic.
 New shared-ish helpers that live locally in skills.js (kept file-local per build-
 plan §1's one-file-per-screen rule, so they're intentionally small duplicates of
 same-named helpers in log.js/settings.js, not shared imports): escapeHtml,
 capitalize, buildCloseButton (renamed from log.js's buildModalCloseButton to avoid
 any confusion, identical purpose).
 Next: Phase D — today.js (activity heatmap, date hero, streak dots, XP strip using
 the Level-ring half of the skill glyph, foci-due rows, rust alerts reusing
 isSkillRusting()/isSkillActive() from skills.js, today's logged units, daily-haul
 roll-up, quick-log shortcuts).
 Post-C tweaks: (1) buildSkillGlyph() (core.js) — the Level ring's arc now renders
 celadon instead of chalk-white once fraction>=1 (every roadmap subtopic done),
 applies wherever the shared glyph is used (Skills cards/detail, log.js preview +
 reward beat) since it's keyed off the generic fraction param, not skill-specific
 state. In-glyph numeral SVG font-size 11->12 to match (2). (2) Base font-size
 17->18px plus every other explicit font-size in styles.css bumped +1px uniformly
 (48 declarations) — a flat shift rather than a proportional scale, so relative
 hierarchy/spacing between sizes is preserved exactly; em-based sizing (e.g.
 .skill-card-name's min-height:2.6em) auto-adjusts, no manual follow-up needed there.
 (3) Requested again, larger — another flat +2px across all 48 font-size
 declarations (base now 20px) plus the glyph numeral 12->14, same reasoning as (2).
